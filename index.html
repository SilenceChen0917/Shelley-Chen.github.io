    <style>
        :root { --accent: #ff6b00; --glass: rgba(15, 15, 20, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050508 !important; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 星空背景层 */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 内容层 */
        #content-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; overflow-y: auto; padding-top: 100px; background: transparent; }
        .page { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* iOS 弹窗特有样式 */
        @keyframes pop {from { opacity: 0; transform: scale(1.1); }
                        to { opacity: 1; transform: scale(1); }}
        .ios-blur {background: rgba(255, 255, 255, 0.75);backdrop-filter: blur(25px) saturate(180%);-webkit-backdrop-filter: blur(25px) saturate(180%);}

        /* 导航栏 */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; gap: 30px; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--accent); }

        /* 卡片效果 */
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { transform: translateY(-8px); border-color: rgba(255, 107, 0, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .id-card-gradient { background: linear-gradient(135deg, #a83279 0%, #3b1654 100%); }
    </style>
</head>

        // --- 3. 核心功能 ---
        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('postList');

        async function savePost() {
            const content = document.getElementById('postContent').value;
            if (!content) return alert("写点内容再发布吧~");
            const { error } = await _supabase.from('posts').insert([{ content }]);
            if (!error) {
                document.getElementById('postContent').value = '';
                fetchPosts();
            }

function showDialog(title, msg, onConfirm) {
    document.getElementById('dialog-title').innerText = title;
    document.getElementById('dialog-msg').innerText = msg;
    const dialog = document.getElementById('ios-dialog');
    dialog.classList.remove('hidden');
    
    document.getElementById('confirm-btn').onclick = async () => {
        await onConfirm();
        closeDialog();
    };
}

function closeDialog() {
    document.getElementById('ios-dialog').classList.add('hidden');
}

// --- 删除功能 ---
function deletePost(id) {
    showDialog("删除随笔", "确定要删除这条珍贵的记录吗？", async () => {
        const { error } = await _supabase.from('posts').delete().eq('id', id);
        if (!error) fetchPosts();
    });
}

async function editPost(id) {
    // 找到当前那条随笔的文字
    const currentText = document.getElementById(`content-${id}`).innerText;
    
    // 调用弹窗：标题，提示语，点击确认后的动作，是否开启输入框(true)，默认文字
    showDialog("编辑随笔", "请修改内容：", async (newVal) => {
        if (newVal && newVal !== currentText) {
            const { error } = await _supabase.from('posts').update({ content: newVal }).eq('id', id);
            if (!error) fetchPosts();
        }
    }, true, currentText);
}

                    "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
                });
            }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 按钮点击高亮逻辑
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                if(item.innerText.includes(document.getElementById(pageId).id)) item.classList.add('active');
            });

            if (pageId === 'journal') fetchPosts();
            document.getElementById('content-wrapper').scrollTo(0, 0);
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.maxHeight = (el.style.maxHeight === "0px" || !el.style.maxHeight) ? "1000px" : "0px";

                </div>`).join('');
            document.getElementById('concert-table-body').innerHTML = concertData.map(c => `
                <tr class="border-b border-white/5">
                    <td class="p-4">${c.date}</td>
                    <td class="p-4">${c.city}</td>
                    <td class="p-4 text-orange-400 font-bold">${c.title}</td>
                </tr>`).join('');
        }

        // --- 5. 启动 ---
        window.onload = () => {
            initStars();
            renderSilence();
            fetchPosts();
        };
    </script>
</body>
</html>
