    <style>
        /* --- 现代极简主义艺术风格核心配置 --- */
        :root { 
            --accent: #ffffff; /* 现代极简偏爱纯白或微粉作为高光 */
            --glass: rgba(255, 255, 255, 0.02); /* 极度清透的微光底色 */
            --text-muted: rgba(255, 255, 255, 0.4); /* 优雅的低沉淀灰色 */
        }
        
        body, html { 
            margin: 0; padding: 0; width: 100%; min-height: 100vh; 
            background: #060609 !important; 
            color: #ffffff; 
            /* 选用干净利落的系统无衬线现代体 */
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            overflow-x: hidden; 
            letter-spacing: 0.5px;
        }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; opacity: 0.4; }
        
        /* 艺术画廊导航栏：去掉粗底边，拉开字间距 */
        .top-nav { 
            position: fixed; top: 0; left: 0; width: 100%; height: 80px; 
            background: rgba(6, 6, 9, 0.7); backdrop-filter: blur(30px); -webkit-backdrop-filter: blur(30px); 
            z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.03); 
            display: flex; align-items: center; justify-content: center; gap: 40px; 
        }
        .nav-item { 
            cursor: pointer; opacity: 0.4; transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); 
            font-size: 14px; font-weight: 300; letter-spacing: 3px; text-transform: uppercase;
        }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--accent); text-shadow: 0 0 10px rgba(255,255,255,0.3); }
        
        #content-wrapper { position: relative; z-index: 10; }
        .page { display: none; width: 100%; max-width: 1100px; margin: 0 auto; padding: 140px 20px 80px 20px; }
        .page.active { display: block; animation: galleryFadeIn 0.8s cubic-bezier(0.16, 1, 0.3, 1); }
        
        @keyframes galleryFadeIn { 
            from { opacity: 0; transform: translateY(15px); filter: blur(4px); } 
            to { opacity: 1; transform: translateY(0); filter: blur(0); } 
        }

        /* 艺术卡片：超大圆角、微光边框、极简悬浮动画 */
        .glass-card { 
            background: var(--glass); 
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.05); 
            border-radius: 24px; padding: 40px; 
            transition: all 0.5s cubic-bezier(0.16, 1, 0.3, 1); 
        }
        .glass-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.15);
            transform: translateY(-2px);
        }
        
        /* 个人ID卡片独立艺术渐变 */
        .id-card-gradient { background: linear-gradient(135deg, rgba(168,50,121,0.15) 0%, rgba(59,22,84,0.15) 100%); }

        /* 极简主义核心：拉开高级感间距与字体粗细对比 */
        .art-huge-title { font-weight: 200; letter-spacing: -1px; line-height: 1.1; }
        .art-sub-title { font-weight: 300; letter-spacing: 6px; color: var(--text-muted); text-transform: uppercase; font-size: 13px; }
        
        /* 极简折叠版块样式 */
        .section-header { transition: color 0.3s; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .section-header:hover { color: var(--accent); }
    </style>
</head>

        // --- 3. 基础页面导航 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            if (pageId === 'journal') fetchPosts();
            if (pageId === 'silence') renderSilence();
            window.scrollTo(0, 0);
        }

        // --- 4. Supabase 随笔交互部分 ---
        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('postList').innerHTML = data.map(post => `
                    <div class="glass-card p-6 relative transition-all">
                        <div class="flex justify-between items-center text-xs text-gray-500 mb-4 border-b border-white/5 pb-3">
                            <span class="text-white flex items-center gap-3 font-light tracking-widest">
                                <img src="${MY_AVATAR}" class="w-6 h-6 rounded-full filter grayscale"> SHELLEY
                            </span>
                            <div class="flex items-center gap-4 font-mono">
                                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                                <div class="flex gap-3">
                                    <button onclick="editPost('${post.id}')" class="text-gray-400 hover:text-white transition">编辑</button>
                                    <button onclick="deletePost('${post.id}')" class="text-gray-600 hover:text-white transition">删除</button>
                                </div>
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm font-light leading-relaxed tracking-wide">${post.content}</p>
                    </div>`).join('');
            }
        }

        async function savePost() {
            const content = document.getElementById('postContent').value;
            if (!content) return;
            await _supabase.from('posts').insert([{ content }]);
            document.getElementById('postContent').value = '';
            fetchPosts();
        }

        function deletePost(id) {
            const dialog = document.getElementById('ios-dialog');
            document.getElementById('dialog-msg').classList.remove('hidden');
            document.getElementById('dialog-input').classList.add('hidden');
            document.getElementById('dialog-msg').innerText = "确定将此随笔从画廊移除吗？";
            dialog.classList.remove('hidden');
            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').delete().eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function editPost(id) {
            const dialog = document.getElementById('ios-dialog');
            const input = document.getElementById('dialog-input');
            document.getElementById('dialog-msg').classList.add('hidden');
            input.classList.remove('hidden');
            dialog.classList.remove('hidden');
            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').update({ content: input.value }).eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function closeDialog() { document.getElementById('ios-dialog').classList.add('hidden'); }

        // --- 5. 渲染汪苏泷的极简艺术画册数据 ---
        function renderSilence() {
            // 极简画册网格渲染
            document.getElementById('album-grid').innerHTML = albumData.map((a, index) => `
                <div class="border-b border-white/5 pb-6 flex flex-col justify-between group">
                    <div>
                        <div class="flex justify-between items-baseline mb-4">

                            <div class="text-xs font-mono text-gray-500">${a.date.split('-')[0]}</div>
                        </div>
                        <div class="flex flex-wrap gap-x-4 gap-y-2 text-xs text-gray-400 font-light tracking-wide leading-relaxed">
                            ${a.songs.map(s => `<span class="hover:text-white transition cursor-default">/ ${s}</span>`).join('')}
                        </div>
                    </div>
                </div>`).join('');

            // 画廊式横向精简排版，彻底告别老套“表格感”

                <div class="flex flex-col md:flex-row md:items-center justify-between py-3 border-b border-white/[0.02] text-xs font-light tracking-wide group hover:border-white/10 transition-all">
                    <div class="flex items-center gap-6 mb-1 md:mb-0">
                        <span class="font-mono text-gray-500 w-20">${c.date}</span>
                        <span class="font-normal text-white text-sm tracking-widest w-16">${c.city}</span>
                        <span class="text-gray-400 font-light truncate max-w-xs md:max-w-md">${c.venue}</span>
                    </div>
                    <span class="text-gray-500 font-mono text-[11px] uppercase tracking-widest bg-white/[0.03] px-3 py-1 rounded-full border border-white/5">${c.title}</span>
                </div>`).join('');
        }

        // 控制下拉折叠
        function toggleSection(id, iconId) {
            const content = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (content.style.maxHeight && content.style.maxHeight !== "0px") {
                content.style.maxHeight = "0px";
                icon.style.transform = "rotate(0deg)";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                icon.style.transform = "rotate(180deg)";
            }
        }
