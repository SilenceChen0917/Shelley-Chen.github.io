<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelley's Space | 向往自由</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --accent: #ff6b00; --glass: rgba(15, 15, 20, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; min-height: 100vh; background: #050508 !important; color: white; font-family: -apple-system, sans-serif; overflow-x: hidden; }
        
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; }
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; gap: 30px; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--accent); }
        
        #content-wrapper { position: relative; z-index: 10; }
        .page { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 100px 20px; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glass-card { background: var(--glass); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px; transition: all 0.4s; }
        .id-card-gradient { background: linear-gradient(135deg, #a83279 0%, #3b1654 100%); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="top-nav">
        <div class="nav-item active" id="nav-about" onclick="showPage('about')">🏠 关于</div>
        <div class="nav-item" id="nav-journal" onclick="showPage('journal')">📝 随笔</div>
        <div class="nav-item" id="nav-silence" onclick="showPage('silence')">🎵 汪苏泷</div>
        <div class="nav-item" id="nav-media" onclick="showPage('media')">🎬 影视</div>
        <div class="nav-item" id="nav-msg" onclick="showPage('msg')">💬 留言</div>
    </nav>
    
    <div id="ios-dialog" class="fixed inset-0 z-[1000] flex items-center justify-center hidden">
        <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
        <div class="relative bg-white/80 backdrop-blur-xl w-[270px] rounded-[14px] overflow-hidden flex flex-col text-center shadow-2xl">
            <div class="p-5">
                <h3 id="dialog-title" class="text-[17px] font-semibold text-black">提示</h3>
                <p id="dialog-msg" class="text-[13px] text-black mt-1 p-2">确定执行吗？</p>
                <textarea id="dialog-input" class="hidden w-full mt-2 p-2 text-sm bg-white/50 border rounded text-black" rows="3"></textarea>
            </div>
            <div class="flex border-t border-black/10 h-[44px]">
                <button onclick="closeDialog()" class="flex-1 text-[#007AFF] border-r border-black/10">取消</button>
                <button id="confirm-btn" class="flex-1 text-[#007AFF] font-semibold">确定</button>
            </div>
        </div>
    </div>

    <div id="content-wrapper">
        <div id="about" class="page active">
            <div class="grid md:grid-cols-2 gap-16 items-center pt-10">
                <div class="glass-card id-card-gradient p-1 w-full max-w-md mx-auto aspect-[3/4] relative">
                    <div class="absolute inset-1 bg-[#101015] rounded-[26px] p-10 flex flex-col items-center justify-between text-center">
                        <div class="w-32 h-32 bg-white rounded-full border-4 border-[#101015] overflow-hidden">
                            <img src="https://cdn.phototourl.com/free/2026-04-07-ce885105-ea21-4277-af0c-280e29364666.jpg" class="w-full h-full object-cover">
                        </div>
                        <div class="space-y-2">
                            <h2 class="text-3xl font-extrabold">Shelley Chen</h2>
                            <p class="text-orange-400 text-sm tracking-widest">Wayfair 运营专员</p>
                        </div>
                        <div class="w-full text-left space-y-3 text-sm text-gray-300 border-t border-white/10 pt-6">
                            <p>🎂 22岁 · 2003.06.20</p>
                            <p>🎓 商务英语 · 湖南</p>
                            <p>愿望：环游世界 🌍</p>
                        </div>
                    </div>
                </div>
                <div class="space-y-10">
                    <h1 class="text-7xl font-extrabold leading-tight">向往自由，<br><span class="text-orange-500">精彩的人生。</span></h1>
                    <div class="glass-card p-6 border-l-4 border-orange-500 bg-white/5 italic text-gray-400">
                        “我和你都在 同一个大大银河 —— Silence Wang”
                    </div>
                </div>
            </div>
        </div>

        <div id="journal" class="page">
            <div class="max-w-4xl mx-auto space-y-10">
                <h2 class="text-4xl font-bold border-b border-orange-500 pb-3 inline-block">📖 随笔日常</h2>
                <div class="glass-card p-8">
                    <textarea id="postContent" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-white focus:border-orange-500 transition mb-4" rows="4" placeholder="写下此刻的想法..."></textarea>
                    <div class="flex justify-end">
                        <button onclick="savePost()" class="bg-orange-600 px-10 py-3 rounded-full font-bold">发布随笔</button>
                    </div>
                </div>
                <div id="postList" class="space-y-6"></div>
            </div>
        </div>

        <div id="silence" class="page">
            <div class="max-w-6xl mx-auto space-y-6">
                <div class="border-b border-orange-500/30 pb-6 mb-10 text-center">
                    <h2 class="text-5xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-white to-orange-500 uppercase">Silence Wang</h2>
                </div>

                <div class="glass-card p-0 mb-6 border-white/5">
                    <div onclick="toggleSection('tour-content', 'tour-icon')" class="p-6 flex justify-between items-center cursor-pointer bg-white/5">
                        <div class="flex items-center gap-6">
                            <h3 class="text-xl font-bold">🎤 巡回演唱会全记录</h3>
                        </div>
                        <span id="tour-icon" class="transition-transform duration-300">▼</span>
                    </div>
                    <div id="tour-content" class="max-h-0 overflow-hidden transition-all duration-500 bg-black/20">
                        <div class="p-6 overflow-x-auto">
                            <table class="w-full text-left text-sm text-gray-300">
                                <thead class="border-b border-white/10 text-orange-500 uppercase">
                                    <tr><th class="p-3">日期</th><th class="p-3">城市</th><th class="p-3">场馆</th><th class="p-3">巡演名称</th></tr>
                                </thead>
                                <tbody id="concert-table-body"></tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <div class="glass-card p-0 border-white/5">
                    <div onclick="toggleSection('album-content', 'album-icon')" class="p-6 flex justify-between items-center cursor-pointer bg-white/5">
                        <h3 class="text-xl font-bold">💿 音乐专辑年表</h3>
                        <span id="album-icon" class="transition-transform duration-300">▼</span>
                    </div>
                    <div id="album-content" class="max-h-0 overflow-hidden transition-all duration-500">
                        <div id="album-grid" class="grid grid-cols-1 md:grid-cols-2 gap-6 p-6"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="media" class="page"><div class="glass-card text-center">🎬 板块整理中...</div></div>
        <div id="msg" class="page"><div class="glass-card text-center">💬 留言板开发中...</div></div>
    </div>

    <script>
        const MY_AVATAR = "https://cdn.phototourl.com/free/2026-04-07-ce885105-ea21-4277-af0c-280e29364666.jpg";
        const _supabase = supabase.createClient('https://qjwghoqhjgspissyysoi.supabase.co', 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqd2dob3FoamdzcGlzc3l5c29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzAyMzgsImV4cCI6MjA5MTEwNjIzOH0.JcYHmNvhY8C-2CpIJAaloSYckBijS0D71fM5ekGzLSU');

        const albumData = [
            { name: "十万伏特", date: "2024-12-21", color: "from-yellow-400 to-orange-500", songs: ["十万伏特", "浪漫主义", "银河系漫游"] },
            { name: "联名", date: "2022-09-19", color: "from-pink-400 to-rose-500", songs: ["如果你也听说", "如果爱忘了"] },
            { name: "万有引力", date: "2012-07-16", color: "from-blue-400 to-blue-600", songs: ["万有引力", "巴赫旧约", "有点甜"] }
        ];

        const concertData = [
            { date: '2026-05-10', city: '郑州', venue: '奥体中心体育场', title: '明日世界' },
            { date: '2026-03-14', city: '西雅图', venue: 'Climate Pledge Arena', title: '罗曼前传' },
            { date: '2025-03-21', city: '北京', venue: '国家体育场（鸟巢）', title: '十万伏特 2.0' }
        ];

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            document.getElementById('nav-' + pageId).classList.add('active');
            if (pageId === 'journal') fetchPosts();
            if (pageId === 'silence') renderSilence();
            window.scrollTo(0, 0);
        }

        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('postList').innerHTML = data.map(post => `
                    <div class="glass-card p-8 group relative transition-all">
                        <div class="flex justify-between items-center text-sm text-gray-400 mb-4 border-b border-gray-800 pb-3">
                            <span class="font-bold text-white flex items-center gap-3">
                                <img src="${MY_AVATAR}" class="w-8 h-8 rounded-full border border-orange-500"> Shelley
                            </span>
                            <div class="flex items-center gap-4">
                                <span>${new Date(post.created_at).toLocaleString()}</span>
                                <div class="flex gap-3">
                                    <button onclick="editPost('${post.id}')" class="text-blue-400">编辑</button>
                                    <button onclick="deletePost('${post.id}')" class="text-red-400">删除</button>
                                </div>
                            </div>
                        </div>
                        <p class="text-gray-200 text-lg">${post.content}</p>
                    </div>`).join('');
            }
        }

        async function savePost() {
            const content = document.getElementById('postContent').value;
            if (!content) return alert("内容不能为空");
            await _supabase.from('posts').insert([{ content }]);
            document.getElementById('postContent').value = '';
            fetchPosts();
        }

        function deletePost(id) {
            const dialog = document.getElementById('ios-dialog');
            document.getElementById('dialog-msg').classList.remove('hidden');
            document.getElementById('dialog-input').classList.add('hidden');
            document.getElementById('dialog-msg').innerText = "确定删除吗？";
            dialog.classList.remove('hidden');
            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').delete().eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function editPost(id) {
            const dialog = document.getElementById('ios-dialog');
            const input = document.getElementById('dialog-input');
            document.getElementById('dialog-msg').classList.add('hidden');
            input.classList.remove('hidden');
            dialog.classList.remove('hidden');
            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').update({ content: input.value }).eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function closeDialog() { document.getElementById('ios-dialog').classList.add('hidden'); }

        function renderSilence() {
            document.getElementById('album-grid').innerHTML = albumData.map((a, index) => `
                <div class="bg-white/5 p-4 rounded-xl border border-white/5">
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded bg-gradient-to-br ${a.color}"></div>
                        <div><div class="font-bold">《${a.name}》</div><div class="text-xs text-gray-500">${a.date}</div></div>
                    </div>
                    <div class="grid grid-cols-2 gap-1 text-[11px] text-gray-400">
                        ${a.songs.map(s => `<div>· ${s}</div>`).join('')}
                    </div>
                </div>`).join('');

            document.getElementById('concert-table-body').innerHTML = concertData.map(c => `
                <tr class="border-b border-white/5">
                    <td class="p-3">${c.date}</td>
                    <td class="p-3 font-bold text-orange-400">${c.city}</td>
                    <td class="p-3 text-gray-400">${c.venue}</td>
                    <td class="p-3 text-xs">${c.title}</td>
                </tr>`).join('');
        }

        function toggleSection(id, iconId) {
            const content = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (content.style.maxHeight && content.style.maxHeight !== "0px") {
                content.style.maxHeight = "0px";
                icon.style.transform = "rotate(0deg)";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                icon.style.transform = "rotate(180deg)";
            }
        }

        window.onload = () => {
            particlesJS('particles-js', { "particles": { "number": { "value": 80 }, "color": { "value": "#ffffff" }, "opacity": { "value": 0.3 }, "size": { "value": 2 }, "line_linked": { "enable": true, "opacity": 0.1 }, "move": { "enable": true, "speed": 1 } } });
        };
    </script>
</body>
</html>
