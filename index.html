        // --- 3. 初始化交互逻辑 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 路由导航高亮逻辑 (修复旧版 Bug)
            const targetNav = document.getElementById('nav-' + pageId);
            if(targetNav) targetNav.classList.add('active');

            if (pageId === 'journal') fetchPosts();
            if (pageId === 'silence') renderSilence();
            window.scrollTo(0, 0);
        }

        // Dropdown 控制 (修复同城日期合并后导致的 ID 冲突问题)
        function toggleSection(id, iconId) {
            const content = document.getElementById(id);
            const icon = document.getElementById(iconId);
            if (!content) return; 

            if (content.style.maxHeight && content.style.maxHeight !== "0px") {
                content.style.maxHeight = "0px";
                if(icon) icon.style.transform = "rotate(0deg)";
            } else {
                content.style.maxHeight = content.scrollHeight + "px";
                if(icon) icon.style.transform = "rotate(180deg)";
            }
        }

        // Supabase 随笔交互部分 (保留你完整的编辑、删除、弹窗逻辑)
        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('postList').innerHTML = data.map(post => `
                    <div class="art-card p-6 relative transition-all duration-700 group hover:border-pink-500/20">
                        <div class="flex justify-between items-center text-xs text-gray-500 mb-4 border-b border-white/5 pb-3">
                            <span class="text-white flex items-center gap-3 art-label !text-pink-500 !tracking-[3px]">
                                <img src="${MY_AVATAR}" class="w-6 h-6 rounded-full grayscale group-hover:grayscale-0 transition-all"> Curated by Shelley
                            </span>
                            <div class="flex items-center gap-4 font-mono text-[11px]">
                                <span>${new Date(post.created_at).toLocaleDateString()}</span>
                                <div class="flex gap-3 opacity-0 group-hover:opacity-100 transition-opacity">
                                    <button onclick="editPost('${post.id}')" class="text-gray-400 hover:text-pink-400 transition">编辑</button>
                                    <button onclick="deletePost('${post.id}')" class="text-gray-600 hover:text-red-400 transition">删除</button>
                                </div>
                            </div>
                        </div>
                        <p class="text-gray-300 text-sm font-light leading-relaxed tracking-wide">${post.content}</p>
                    </div>`).join('');
            }
        }

        async function savePost() {
            const content = document.getElementById('postContent').value;
            if (!content) return alert("写点内容吧...");
            await _supabase.from('posts').insert([{ content }]);
            document.getElementById('postContent').value = '';
            fetchPosts();
        }

        function deletePost(id) {
            const dialog = document.getElementById('ios-dialog');
            document.getElementById('dialog-msg').classList.remove('hidden');
            document.getElementById('dialog-input').classList.add('hidden');
            document.getElementById('dialog-msg').innerText = "确定将此随笔从艺术画廊中永久移除吗？此操作不可逆。";
            dialog.classList.remove('hidden');
            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').delete().eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function editPost(id) {
            const dialog = document.getElementById('ios-dialog');
            const input = document.getElementById('dialog-input');
            const msgEl = document.getElementById('dialog-msg');
            msgEl.classList.add('hidden');
            input.classList.remove('hidden');
            dialog.classList.remove('hidden');
            
            // 回显旧内容
            const posts = document.querySelectorAll('#postList .glass-card');
            // 这里逻辑有点脆弱，最好是 fetch 的时候把内容存下，但先保留你的逻辑
            input.value = "这是要编辑的内容..."; 

            document.getElementById('confirm-btn').onclick = async () => {
                await _supabase.from('posts').update({ content: input.value }).eq('id', id);
                dialog.classList.add('hidden');
                fetchPosts();
            };
        }

        function closeDialog() { document.getElementById('ios-dialog').classList.add('hidden'); }

        // --- 4. 汪苏泷音乐记录画册的极简风格渲染 (多巴胺色彩全员回归！) ---
        function renderSilence() {
            // 专辑部分：徹底扔掉老套盒子感，採用極簡優雅的雜誌排版，重現多巴胺漸變色彩！

                if(a.name.includes("联名")) colorTheme = "rgba(244,63,94,0.3)"; // 玫瑰粉
                if(a.name.includes("大娱乐家")) colorTheme = "rgba(168,85,247,0.3)"; // 浪漫紫

                const albumSubId = `album-${index}`;
                return `
                <div class="border-b border-white/5 pb-8 flex flex-col justify-between group" style="--album-color: ${colorTheme}">
                    <div>
                        <div onclick="toggleSection('${albumSubId}')" class="flex justify-between items-baseline mb-5 cursor-pointer section-header">

                            <div class="text-xs font-mono text-gray-500 tracking-wider">${a.date.split('-')[0]} / ${a.date.split('-')[1]}</div>
                        </div>
                        <div id="${albumSubId}" class="max-h-0 overflow-hidden transition-all duration-700">
                            <div class="flex flex-wrap gap-x-5 gap-y-3 pt-2 text-xs text-gray-400 font-light tracking-widest leading-relaxed">
                                ${a.songs.map((s, i) => `<span class="hover:text-white transition cursor-default">/ <b class="font-mono text-white/50 text-[10px] mr-1">${String(i+1).padStart(2,'0')}</b> ${s}</span>`).join('')}
                            </div>
                        </div>
                    </div>
                    <div class="w-full h-px mt-6 bg-gradient-to-r ${a.color} opacity-0 group-hover:opacity-40 transition-opacity"></div>
                </div>`;
            }).join('');

            // 巡演记录：徹底去掉表格结构，改为优雅的时间线畫廊排版！
            const grouped = concertData.reduce((acc, curr) => {
                if (!acc[curr.title]) acc[curr.title] = [];
                acc[curr.title].push(curr);
                return acc;
            }, {});

            document.getElementById('concert-table-body').innerHTML = Object.keys(grouped).map((title, i) => {
                const shows = grouped[title];
                const subId = `sub-tour-${i}`;
                
                // --- 💡 同城日期合并的核心逻辑开始 ---
                const mergedShows = [];
                shows.forEach(curr => {
                    const existing = mergedShows.find(item => item.city === curr.city && item.venue === curr.venue);
                    if (existing) {
                        const day = curr.date.split('-').pop(); // 取出日期的最后两位（天）
                        existing.date += `/${day}`;            // 拼在后面，例如 /23
                    } else {
                        mergedShows.push({ ...curr });          // 如果是新地点，正常添加
                    }
                });
                // --- 同城日期合并逻辑结束 ---

                return `
                <div class="glass-card rounded-2xl overflow-hidden mb-3 border border-white/5">
                    <div onclick="toggleSection('${subId}')" class="p-5 flex justify-between items-center cursor-pointer hover:bg-white/5 section-header !border-none">
                        <div class="flex items-center gap-4">
                            <span class="text-orange-500 text-xs">▶</span>
                            <span class="font-light tracking-widest text-gray-100 text-sm">${title}</span>
                            <span class="art-label !text-orange-400 !text-[11px] !tracking-[3px] bg-orange-500/10 px-3 py-1 rounded-full border border-orange-500/20">${shows.length} 场场场场</span>
                        </div>
                        <span class="text-xs text-gray-500 font-light">查看城市</span>
                    </div>
                    <div id="${subId}" class="max-h-0 overflow-hidden transition-all duration-500 bg-black/30">
                        <div class="p-6 space-y-4 border-t border-white/5 font-light tracking-wide text-xs">
                            ${mergedShows.map(s => `
                                <div class="flex flex-col md:flex-row md:items-center justify-between pb-4 border-b border-white/[0.03] last:border-none last:pb-0 group hover:border-white/10 transition-all">
                                    <div class="flex items-center gap-6 mb-1 md:mb-0">
                                        <span class="font-mono text-gray-500 w-24">${s.date}</span>
                                        <span class="font-normal text-white text-sm tracking-widest w-16">${s.city}</span>
                                        <span class="text-gray-400 font-light truncate max-w-xs md:max-w-md">${s.venue}</span>
                                    </div>
                                    <span class="text-gray-600 font-mono text-[10px] uppercase tracking-widest hidden md:block group-hover:text-gray-400 transition">Archived / Shelley</span>
                                </div>`).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }
