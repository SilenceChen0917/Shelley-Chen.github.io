<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelley's Space | 向往自由</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/particles.js@2.0.0/particles.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        :root { --accent: #ff6b00; --glass: rgba(15, 15, 20, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050508 !important; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 星空背景层 */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 内容层 */
        #content-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; overflow-y: auto; padding-top: 100px; background: transparent; }
        .page { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* iOS 弹窗特有样式 */
        @keyframes pop {from { opacity: 0; transform: scale(1.1); }
                        to { opacity: 1; transform: scale(1); }}
        .ios-blur {background: rgba(255, 255, 255, 0.75);backdrop-filter: blur(25px) saturate(180%);-webkit-backdrop-filter: blur(25px) saturate(180%);}

        /* 导航栏 */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; gap: 30px; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--accent); }

        /* 卡片效果 */
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { transform: translateY(-8px); border-color: rgba(255, 107, 0, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .id-card-gradient { background: linear-gradient(135deg, #a83279 0%, #3b1654 100%); }
    </style>
</head>
<body>

    <div id="particles-js"></div>

    <nav class="top-nav">
        <div class="nav-item active" onclick="showPage('about')">🏠 关于</div>
        <div class="nav-item" onclick="showPage('journal')">📝 随笔</div>
        <div class="nav-item" onclick="showPage('silence')">🎵 汪苏泷</div>
        <div class="nav-item" onclick="showPage('media')">🎬 影视</div>
        <div class="nav-item" onclick="showPage('msg')">💬 留言</div>
    </nav>
    
    <div id="ios-dialog" class="fixed inset-0 z-[1000] flex items-center justify-center hidden">
    <div class="absolute inset-0 bg-black/40 backdrop-blur-sm"></div>
    <div class="relative bg-white/80 backdrop-blur-xl w-[270px] rounded-[14px] overflow-hidden flex flex-col text-center animate-[pop_0.3s_ease-out]">
        <div class="p-5">
            <h3 id="dialog-title" class="text-[17px] font-semibold text-black">确认操作</h3>
            <p id="dialog-msg" class="text-[13px] text-black mt-1">确定要执行此操作吗？</p>
        </div>
        <div class="flex border-t border-black/10 h-[44px]">
            <button onclick="closeDialog()" class="flex-1 text-[17px] text-[#007AFF] border-r border-black/10 active:bg-black/5">取消</button>
            <button id="confirm-btn" class="flex-1 text-[17px] text-[#007AFF] font-semibold active:bg-black/5">确定</button>
        </div>
    </div>
</div>

<style>
@keyframes pop {
    from { opacity: 0; transform: scale(1.2); }
    to { opacity: 1; transform: scale(1); }
}
</style>

    <div id="content-wrapper">
        <div id="about" class="page active">
            <div class="grid md:grid-cols-2 gap-16 items-center pt-10">
                <div class="glass-card id-card-gradient p-1 w-full max-w-md mx-auto aspect-[3/4] overflow-hidden relative">
                    <div class="absolute inset-1 bg-[#101015] rounded-[26px] overflow-hidden p-10 flex flex-col items-center justify-between text-center">
                        <div class="w-32 h-32 bg-white rounded-full border-4 border-[#101015] overflow-hidden">
                            <img src="https://cdn.phototourl.com/free/2026-04-07-ce885105-ea21-4277-af0c-280e29364666.jpg" class="w-full h-full object-cover">
                        </div>
                        <div class="space-y-2">
                            <h2 class="text-3xl font-extrabold">Shelley Chen</h2>
                            <p class="text-orange-400 text-sm tracking-widest">Wayfair 运营专员</p>
                        </div>
                        <div class="w-full text-left space-y-3 text-sm text-gray-300 border-t border-white/10 pt-6">
                            <p>🎂 22岁 · 2003.06.20</p>
                            <p>🎓 商务英语 · 湖南</p>
                            <p>愿望：环游世界 🌍</p>
                        </div>
                    </div>
                </div>
                <div class="space-y-10">
                    <h1 class="text-7xl font-extrabold leading-tight">向往自由，<br><span class="text-orange-500">精彩的人生。</span></h1>
                    <div class="glass-card p-6 border-l-4 border-orange-500 bg-white/5 italic text-gray-400">
                        “我和你都在 同一个大大银河 —— Silence Wang”
                    </div>
                </div>
            </div>
        </div>

        <div id="journal" class="page">
            <div class="max-w-4xl mx-auto space-y-10">
                <h2 class="text-4xl font-bold italic border-b border-orange-500 pb-3 inline-block">📖 随笔日常</h2>
                <div class="glass-card p-8">
                    <textarea id="postContent" class="w-full bg-white/5 border border-white/10 rounded-2xl p-6 text-white focus:outline-none focus:border-orange-500 transition mb-4" rows="4" placeholder="写下此刻的想法..."></textarea>
                    <div class="flex justify-end">
                        <button onclick="savePost()" class="bg-orange-600 px-10 py-3 rounded-full font-bold hover:scale-105 transition">发布随笔</button>
                    </div>
                </div>
                <div id="postList" class="space-y-6">
                    </div>
            </div>
        </div>

        <div id="silence" class="page">
            <div class="max-w-6xl mx-auto space-y-6">
                <h2 class="text-5xl font-black italic bg-clip-text text-transparent bg-gradient-to-r from-white to-orange-500 mb-10">SILENCE WANG</h2>
                
                <div class="glass-card p-0 overflow-hidden mb-8">
                    <div onclick="toggleSection('tour-content')" class="p-6 flex justify-between items-center cursor-pointer bg-white/5">
                        <h3 class="text-xl font-bold">🎤 巡回演唱会记录</h3>
                        <span>▼</span>
                    </div>
                    <div id="tour-content" class="max-h-0 overflow-hidden transition-all duration-500">
                        <table class="w-full text-left text-sm">
                            <tbody id="concert-table-body" class="divide-y divide-white/5"></tbody>
                        </table>
                    </div>
                </div>

                <div class="glass-card p-0 overflow-hidden">
                    <div onclick="toggleSection('album-content')" class="p-6 flex justify-between items-center cursor-pointer bg-white/5">
                        <h3 class="text-xl font-bold">💿 音乐专辑年表</h3>
                        <span>▼</span>
                    </div>
                    <div id="album-content" class="max-h-0 overflow-hidden transition-all duration-500">
                        <div id="album-grid" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-6"></div>
                    </div>
                </div>
            </div>
        </div>

        <div id="media" class="page"><div class="glass-card text-center">🎬 板块整理中...</div></div>
        <div id="msg" class="page"><div class="glass-card text-center">💬 留言板开发中...</div></div>
    </div>

    <script>
        // --- 1. 初始化配置 ---
        const MY_AVATAR = "https://cdn.phototourl.com/free/2026-04-07-ce885105-ea21-4277-af0c-280e29364666.jpg";
        const SUPABASE_URL = 'https://qjwghoqhjgspissyysoi.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InFqd2dob3FoamdzcGlzc3l5c29pIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzU1MzAyMzgsImV4cCI6MjA5MTEwNjIzOH0.JcYHmNvhY8C-2CpIJAaloSYckBijS0D71fM5ekGzLSU';
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // --- 2. 汪苏泷数据 ---
        const albumData = [
            { name: "十万伏特", date: "2024", color: "from-yellow-400" },
            { name: "联名", date: "2022", color: "from-purple-600" },
            { name: "大娱乐家", date: "2020", color: "from-pink-600" }
        ];
        const concertData = [
            { date: '2026-05-01', city: '郑州', venue: '奥体中心', title: '明日世界' },
            { date: '2025-03-21', city: '北京', venue: '鸟巢', title: '十万伏特2.0' }
        ];

        // --- 3. 核心功能 ---
        async function fetchPosts() {
            const { data } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            const list = document.getElementById('postList');
            if (data && list) {
                list.innerHTML = data.map(post => `
                    <div class="glass-card p-8 mb-6">
                        <div class="flex items-center gap-3 mb-4 border-b border-white/5 pb-3">
                            <img src="${MY_AVATAR}" class="w-8 h-8 rounded-full">
                            <span class="font-bold text-white">Shelley</span>
                            <span class="text-xs text-gray-500 ml-auto">${new Date(post.created_at).toLocaleString()}</span>
                        </div>
                        <p class="text-gray-200">${post.content}</p>
                    </div>
                `).join('');
            }
        }

        async function savePost() {
            const content = document.getElementById('postContent').value;
            if (!content) return alert("写点内容再发布吧~");
            const { error } = await _supabase.from('posts').insert([{ content }]);
            if (!error) {
                document.getElementById('postContent').value = '';
                fetchPosts();
            }
        }
        // --- 自定义弹窗逻辑 ---
function showDialog(title, msg, onConfirm) {
    document.getElementById('dialog-title').innerText = title;
    document.getElementById('dialog-msg').innerText = msg;
    const dialog = document.getElementById('ios-dialog');
    dialog.classList.remove('hidden');
    
    document.getElementById('confirm-btn').onclick = async () => {
        await onConfirm();
        closeDialog();
    };
}

function closeDialog() {
    document.getElementById('ios-dialog').classList.add('hidden');
}

// --- 渲染随笔列表 ---
async function fetchPosts() {
    const { data, error } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
    if (data) {
        document.getElementById('postList').innerHTML = data.map(post => `
            <div class="glass-card p-8 group relative transition-all hover:border-orange-500/30">
                <div class="flex justify-between items-center text-sm text-gray-500 mb-4 border-b border-gray-800 pb-3">
                    <span class="font-bold text-white flex items-center gap-3">
                        <img src="${MY_AVATAR}" class="w-8 h-8 rounded-full border border-orange-500/50 shadow-lg">
                        Shelley
                    </span>
                    <div class="flex items-center gap-4">
                        <span>${new Date(post.created_at).toLocaleString()}</span>
                        <div class="opacity-0 group-hover:opacity-100 transition-opacity flex gap-3">
                            <button onclick="editPost('${post.id}')" class="text-blue-400 hover:text-blue-300 text-xs">编辑</button>
                            <button onclick="deletePost('${post.id}')" class="text-red-400 hover:text-red-300 text-xs">删除</button>
                        </div>
                    </div>
                </div>
                <p id="p-${post.id}" class="text-gray-200 text-lg leading-relaxed">${post.content}</p>
            </div>
        `).join('');
    }
}

// --- 删除功能 ---
function deletePost(id) {
    showDialog("删除随笔", "确定要删除这条珍贵的记录吗？", async () => {
        const { error } = await _supabase.from('posts').delete().eq('id', id);
        if (!error) fetchPosts();
    });
}

// --- 编辑功能 ---
function editPost(id) {
        const currentText = document.getElementById(`content-${id}`).innerText;
        showDialog("编辑随笔", "请输入修改后的内容：", async (newVal) => {
            if (newVal && newVal !== currentText) {
                const { error } = await _supabase.from('posts').update({ content: newVal }).eq('id', id);
                if (!error) fetchPosts();
            }
        }, true, currentText);
    }
        
        function initStars() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    "particles": {
                        "number": { "value": 100 },
                        "color": { "value": "#ffffff" },
                        "opacity": { "value": 0.5 },
                        "size": { "value": 2 },
                        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2 },
                        "move": { "enable": true, "speed": 1.5 }
                    },
                    "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
                });
            }
        }

        // --- 4. 交互 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 按钮点击高亮逻辑
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                if(item.innerText.includes(document.getElementById(pageId).id)) item.classList.add('active');
            });

            if (pageId === 'journal') fetchPosts();
            document.getElementById('content-wrapper').scrollTo(0, 0);
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.maxHeight = (el.style.maxHeight === "0px" || !el.style.maxHeight) ? "1000px" : "0px";
        }

        function renderSilence() {
            document.getElementById('album-grid').innerHTML = albumData.map(a => `
                <div class="flex gap-4 p-4 bg-white/5 rounded-xl">
                    <div class="w-12 h-12 rounded bg-gradient-to-br ${a.color}"></div>
                    <div><div class="font-bold">《${a.name}》</div><div class="text-xs text-gray-500">${a.date}</div></div>
                </div>`).join('');
            document.getElementById('concert-table-body').innerHTML = concertData.map(c => `
                <tr class="border-b border-white/5">
                    <td class="p-4">${c.date}</td>
                    <td class="p-4">${c.city}</td>
                    <td class="p-4 text-orange-400 font-bold">${c.title}</td>
                </tr>`).join('');
        }

        // --- 5. 启动 ---
        window.onload = () => {
            initStars();
            renderSilence();
            fetchPosts();
        };
    </script>
</body>
</html>
