<head>

    <style>
        :root {
            --ios-bg: #f5f5f7;
            --ios-dark: #1d1d1f;
            --ios-accent: #0071e3;
            --glass: rgba(255, 255, 255, 0.7);
        }

        * { box-sizing: border-box; scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "SF Pro Text", "Helvetica Neue", Arial, sans-serif; margin: 0; background: var(--ios-bg); color: var(--ios-dark); overflow-x: hidden; }

        /* --- iOS 26 灵动导航坞 (Floating Dock) --- */
        .ios-nav {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: var(--glass);
            backdrop-filter: blur(25px) saturate(180%);
            -webkit-backdrop-filter: blur(25px) saturate(180%);
            padding: 10px 25px;
            border-radius: 35px;
            display: flex;
            gap: 30px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
        }
        .ios-nav:hover { transform: translateX(-50%) scale(1.05); background: rgba(255,255,255,0.85); }
        .ios-nav a {
            text-decoration: none;
            color: var(--ios-dark);
            font-size: 0.85rem;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            opacity: 0.6;
            transition: 0.3s;
        }
        .ios-nav a:hover { opacity: 1; color: var(--ios-accent); }
        .nav-icon { font-size: 1.2rem; margin-bottom: 2px; }

        /* --- 内容区域样式 --- */
        section { min-height: 100vh; padding: 60px 20px; display: flex; align-items: center; justify-content: center; }
        .container { max-width: 1000px; width: 100%; margin: 0 auto; }

        .hero-sub { font-size: 1.5rem; color: #86868b; margin-top: 20px; }
