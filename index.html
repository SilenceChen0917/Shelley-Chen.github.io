    <style>
        :root { --accent: #ff6b00; --glass: rgba(15, 15, 20, 0.8); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #050508 !important; color: white; font-family: -apple-system, sans-serif; overflow: hidden; }
        
        /* 星空背景层 */
        #particles-js { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }

        /* 内容层 */
        #content-wrapper { position: relative; z-index: 10; width: 100%; height: 100%; overflow-y: auto; padding-top: 100px; background: transparent; }
        .page { display: none; width: 100%; max-width: 1200px; margin: 0 auto; padding: 40px 20px 100px; }
        .page.active { display: block; animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* iOS 弹窗特有样式 */
        @keyframes pop {from { opacity: 0; transform: scale(1.1); }
                        to { opacity: 1; transform: scale(1); }}
        .ios-blur {background: rgba(255, 255, 255, 0.75);backdrop-filter: blur(25px) saturate(180%);-webkit-backdrop-filter: blur(25px) saturate(180%);}

        /* 导航栏 */
        .top-nav { position: fixed; top: 0; left: 0; width: 100%; height: 70px; background: rgba(10, 10, 15, 0.7); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); z-index: 100; border-bottom: 1px solid rgba(255,255,255,0.05); display: flex; align-items: center; justify-content: center; gap: 30px; }
        .nav-item { cursor: pointer; opacity: 0.7; transition: 0.3s; font-size: 15px; font-weight: 500; }
        .nav-item:hover, .nav-item.active { opacity: 1; color: var(--accent); }

        /* 卡片效果 */
        .glass-card { background: var(--glass); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.08); border-radius: 28px; padding: 40px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .glass-card:hover { transform: translateY(-8px); border-color: rgba(255, 107, 0, 0.4); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
        .id-card-gradient { background: linear-gradient(135deg, #a83279 0%, #3b1654 100%); }
    </style>
</head>

        // --- 自定义弹窗逻辑 ---
function showDialog(title, msg, callback, isInput = false, defaultValue = "") {
    const dialog = document.getElementById('customDialog');
    const titleEl = document.getElementById('dialogTitle');
    const msgEl = document.getElementById('dialogMsg');
    const inputEl = document.getElementById('dialogInput');
    const confirmBtn = document.getElementById('dialogConfirm');
    const cancelBtn = document.getElementById('dialogCancel');

    // 设置内容
    titleEl.innerText = title;
    msgEl.innerText = msg;
    
    // 如果是编辑模式，显示输入框
    if (isInput) {
        inputEl.classList.remove('hidden');
        inputEl.value = defaultValue;
        msgEl.classList.add('hidden'); // 编辑时通常不需要提示语
    } else {
        inputEl.classList.add('hidden');
        msgEl.classList.remove('hidden');
    }

    dialog.classList.remove('hidden');

    // 绑定点击事件
    confirmBtn.onclick = () => {
        const result = isInput ? inputEl.value : true;
        callback(result);
        dialog.classList.add('hidden');
    };

    cancelBtn.onclick = () => {
        dialog.classList.add('hidden');
    };
}

function closeDialog() {
    document.getElementById('ios-dialog').classList.add('hidden');
}

// --- 删除功能 (对接 iOS 弹窗) ---
function deletePost(id) {
    const dialog = document.getElementById('ios-dialog');
    const confirmBtn = document.getElementById('confirm-btn');
    const msgEl = document.getElementById('dialog-msg');
    const inputEl = document.getElementById('dialog-input'); // ✅
    
    // 1. 设置弹窗为“删除”模式：隐藏输入框，显示提示文字
    inputEl.classList.add('hidden');
    msgEl.classList.remove('hidden');
    msgEl.innerText = "确定要删除这条珍贵的记录吗？";
    
    // 2. 显示弹窗
    dialog.classList.remove('hidden');

    // 3. 绑定确认删除逻辑
    confirmBtn.onclick = async () => {
        const { error } = await _supabase.from('posts').delete().eq('id', id);
        if (!error) {
            dialog.classList.add('hidden');
            fetchPosts(); // 刷新列表
        } else {
            alert("删除失败: " + error.message);
        }
    };
}

// --- 编辑功能 (对接 iOS 弹窗) ---
async function editPost(id) {
    const dialog = document.getElementById('ios-dialog');
    const confirmBtn = document.getElementById('confirm-btn');
    const msgEl = document.getElementById('dialog-msg');
    const inputEl = document.getElementById('dialog-input'); // ✅
    
    // 1. 获取当前那条随笔的内容
    const contentEl = document.getElementById(`content-${id}`);
    const currentText = contentEl ? contentEl.innerText : "";
    
    // 2. 设置弹窗为“编辑”模式：隐藏提示文字，显示输入框并回显文字
    msgEl.classList.add('hidden');
    inputEl.classList.remove('hidden');
    inputEl.value = currentText; // 💡 关键：把旧文字填进去

    // 3. 显示弹窗
    dialog.classList.remove('hidden');

    // 4. 绑定确认修改逻辑
    confirmBtn.onclick = async () => {
        const newVal = inputEl.value.trim();
        
        // 如果有修改且不为空
        if (newVal && newVal !== currentText) {
            const { error } = await _supabase
                .from('posts')
                .update({ content: newVal })
                .eq('id', id);
            
            if (!error) {
                dialog.classList.add('hidden');
                fetchPosts(); // 刷新列表
            } else {
                alert("修改失败: " + error.message);
            }
        } else {
            // 如果没修改，直接关闭
            dialog.classList.add('hidden');
        }
    };
}
        
        function initStars() {
            if (typeof particlesJS !== 'undefined') {
                particlesJS('particles-js', {
                    "particles": {
                        "number": { "value": 100 },
                        "color": { "value": "#ffffff" },
                        "opacity": { "value": 0.5 },
                        "size": { "value": 2 },
                        "line_linked": { "enable": true, "distance": 150, "color": "#ffffff", "opacity": 0.2 },
                        "move": { "enable": true, "speed": 1.5 }
                    },
                    "interactivity": { "events": { "onhover": { "enable": true, "mode": "grab" } } }
                });
            }
        }

        // --- 4. 交互 ---
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            
            // 按钮点击高亮逻辑
            const items = document.querySelectorAll('.nav-item');
            items.forEach(item => {
                if(item.innerText.includes(document.getElementById(pageId).id)) item.classList.add('active');
            });

            if (pageId === 'journal') fetchPosts();
            document.getElementById('content-wrapper').scrollTo(0, 0);
        }

        function toggleSection(id) {
            const el = document.getElementById(id);
            el.style.maxHeight = (el.style.maxHeight === "0px" || !el.style.maxHeight) ? "1000px" : "0px";
        }

        function renderSilence() {
    // 1. 渲染专辑部分（这部分保持你原来的样子）
    document.getElementById('album-grid').innerHTML = albumData.map(a => `
        <div class="flex gap-4 p-4 bg-white/5 rounded-xl">
            <div class="w-12 h-12 rounded bg-gradient-to-br ${a.color}"></div>
            <div>
                <div class="font-bold text-sm">《${a.name}》</div>
                <div class="text-[10px] text-gray-500">${a.date}</div>
            </div>
        </div>`).join('');

    // 2. 渲染演唱会列表
    const tourList = document.getElementById('tour-nested-list');
    
    // 第一步：按 title 分组 (二级：巡演主题)
    const grouped = concertData.reduce((acc, curr) => {
        if (!acc[curr.title]) acc[curr.title] = [];
        acc[curr.title].push(curr);
        return acc;
    }, {});

    tourList.innerHTML = Object.keys(grouped).map((title, index) => {
        const shows = grouped[title];
        const subId = `sub-tour-${index}`;
        
        // --- 💡 【核心修改在这里】合并日期逻辑开始 ---
        const mergedShows = [];
        shows.forEach(curr => {
            // 检查 mergedShows 里是否已经有同一个地方的场次了
            const existing = mergedShows.find(item => item.city === curr.city && item.venue === curr.venue);
            
            if (existing) {
                // 如果地点一样，只把日期后面的数字（天）取出来，拼在后面
                // 比如从 2025-03-22 变成 /22
                const day = curr.date.split('-').pop(); 
                existing.date += `/${day}`;
            } else {
                // 如果是新地点，就正常加进去
                mergedShows.push({ ...curr });
            }
        });
        // --- 合并逻辑结束 ---

        return `
            <div class="border border-white/5 rounded-xl overflow-hidden bg-white/5 mb-2">
                <div onclick="toggleSection('${subId}')" class="p-4 flex justify-between items-center cursor-pointer hover:bg-white/10 transition">
                    <div class="flex items-center gap-3">
                        <span class="text-orange-500 text-[10px]">▶</span>
                        <span class="font-bold text-sm text-gray-200">${title}</span>
                        <span class="text-[10px] px-2 py-0.5 bg-orange-500/10 text-orange-400 rounded-full">${shows.length} 场</span>
                    </div>
                    <span class="text-[10px] text-gray-500">查看详情</span>
                </div>
                
                <div id="${subId}" class="max-h-0 overflow-hidden transition-all duration-300 ease-in-out bg-black/40">
                    <div class="p-4 space-y-3 border-t border-white/5">
                        ${mergedShows.map(s => `
                            <div class="flex justify-between items-center py-3 border-b border-white/5 last:border-0">
                                <div class="w-[140px] text-sm text-gray-300 font-mono tracking-tighter">${s.date}</div>
                                
                                <div class="flex-1 text-center text-sm text-white font-bold tracking-widest">${s.city}</div>
                                
                                <div class="w-[140px] text-right text-sm text-gray-400 truncate">${s.venue}</div>
                            </div>
                        `).join('')}
                    </div>
                </div>
            </div>
        `;
    }).join('');

    // 更新总计数据
    document.getElementById('total-shows').innerText = concertData.length;
    const cities = new Set(concertData.map(c => c.city)).size;
    document.getElementById('total-cities').innerText = cities;
}

            initStars();
            renderSilence();
            fetchPosts();
        };
