<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shelley's Space</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --accent: #ff6b00; --glass: rgba(255, 255, 255, 0.05); }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background: #050508; color: white; font-family: -apple-system, sans-serif; }
        
        /* 动态星空画布 */
        #starfield { position: fixed; top: 0; left: 0; z-index: -1; }

        /* 导航栏 */
        .nav-dock { 
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: rgba(20, 20, 25, 0.8); padding: 12px 25px; border-radius: 40px;
            backdrop-filter: blur(20px); z-index: 1000; border: 1px solid rgba(255,255,255,0.1);
            display: flex; gap: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .nav-item { cursor: pointer; opacity: 0.6; transition: 0.3s; font-size: 14px; }
        .nav-item.active { opacity: 1; color: var(--accent); transform: scale(1.1); }

        /* 页面切换逻辑 */
        .page { 
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
            display: none; padding: 40px 20px; overflow-y: auto; 
            box-sizing: border-box; -webkit-overflow-scrolling: touch;
        }
        .page.active { display: block; animation: fadeIn 0.5s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .glass-card { 
            background: var(--glass); backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(255,255,255,0.1); border-radius: 28px; padding: 30px;
        }
        .id-card-gradient { background: linear-gradient(135deg, #a83279 0%, #3b1654 100%); }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <nav class="nav-dock">
        <div class="nav-item active" onclick="showPage('about')">🏠 关于</div>
        <div class="nav-item" onclick="showPage('journal')">📝 随笔</div>
        <div class="nav-item" onclick="showPage('silence')">🎵 汪苏泷</div>
        <div class="nav-item" onclick="showPage('media')">🎬 影视</div>
        <div class="nav-item" onclick="showPage('msg')">💬 留言</div>
    </nav>

    <div id="about" class="page active">
        <div class="max-w-4xl mx-auto pt-10 space-y-10">
            <div class="glass-card flex flex-col md:flex-row items-center gap-10">
                <div class="w-64 h-80 id-card-gradient rounded-3xl relative overflow-hidden flex-shrink-0 shadow-2xl">
                    <div class="absolute top-10 left-1/2 -translate-x-1/2 w-28 h-28 bg-white rounded-full border-4 border-[#1a1a1d] overflow-hidden">
                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Shelley" alt="avatar">
                    </div>
                    <div class="absolute bottom-10 w-full text-center px-4">
                        <h2 class="text-xl font-bold">Shelley Chen</h2>
                        <p class="text-[10px] opacity-70 mt-1 uppercase tracking-widest">Wayfair Ops Specialst</p>
                    </div>
                </div>
                <div class="space-y-6">
                    <h1 class="text-4xl font-bold italic">向往自由，精彩人生</h1>
                    <p class="text-gray-400 leading-relaxed italic">“我和你都在 同一个大大银河，会炙热 会冷漠 但也独特。”</p>
                    <div class="grid grid-cols-2 gap-4 text-sm text-gray-300">
                        <div class="bg-white/5 p-3 rounded-xl">🎂 22岁 · 06.20</div>
                        <div class="bg-white/5 p-3 rounded-xl">🎓 商务英语专业</div>
                        <div class="bg-white/5 p-3 rounded-xl">📍 湖南 · 长沙</div>
                        <div class="bg-white/5 p-3 rounded-xl">📚 喜爱《飘》</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="journal" class="page">
        <div class="max-w-2xl mx-auto pt-10 space-y-6">
            <h2 class="text-2xl font-bold italic">📖 随笔日常</h2>
            <div class="glass-card">
                <textarea id="postContent" class="w-full bg-transparent border-none focus:ring-0 text-white placeholder-gray-600" rows="3" placeholder="此刻的想法..."></textarea>
                <div class="flex justify-end mt-4">
                    <button onclick="savePost()" class="bg-orange-600 px-6 py-2 rounded-full font-bold text-sm">发布</button>
                </div>
            </div>
            <div id="postList" class="space-y-4 pb-20"></div>
        </div>
    </div>

    <div id="silence" class="page">
        <div class="max-w-4xl mx-auto pt-10">
            <div class="glass-card bg-gradient-to-br from-purple-900/20 to-orange-900/20">
                <h2 class="text-3xl font-bold mb-8">🎵 汪苏泷 Silence Wang</h2>
                <div class="grid md:grid-cols-2 gap-8">
                    <div class="space-y-6">
                        <h4 class="text-orange-500 font-bold tracking-widest uppercase text-xs">Album History</h4>
                        <ul class="space-y-4 text-sm">
                            <li><span class="text-orange-500 mr-2">2024</span> 《21世纪罗曼史》</li>
                            <li><span class="text-gray-500 mr-2">2022</span> 《联名》</li>
                            <li><span class="text-gray-500 mr-2">2020</span> 《大娱乐家》</li>
                        </ul>
                    </div>
                    <div class="bg-white/5 p-6 rounded-2xl border border-white/10">
                        <p class="text-sm italic">“我去过现场！那是我与青春最近的一次重逢。”</p>
                        <div class="mt-4 flex gap-2">
                            <div class="w-20 h-20 bg-white/10 rounded-lg"></div>
                            <div class="w-20 h-20 bg-white/10 rounded-lg"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="media" class="page"><div class="max-w-4xl mx-auto pt-20 glass-card text-center text-gray-400">影视内容板块施工中...</div></div>
    <div id="msg" class="page"><div class="max-w-4xl mx-auto pt-20 glass-card text-center text-gray-400">留言板板块施工中...</div></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // 1. 动态星空背景引擎
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        let stars = [];
        function initStars() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = [];
            for (let i = 0; i < 150; i++) {
                stars.push({ x: Math.random() * canvas.width, y: Math.random() * canvas.height, size: Math.random() * 1.5, speed: Math.random() * 0.5 });
            }
        }
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = 'white';
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
                ctx.fill();
                s.y += s.speed;
                if (s.y > canvas.height) s.y = 0;
            });
            requestAnimationFrame(draw);
        }
        window.addEventListener('resize', initStars);
        initStars(); draw();

        // 2. 页面切换逻辑
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            event.target.classList.add('active');
        }

        // 3. Supabase 逻辑 (直接复用你之前的配置)
        const SUPABASE_URL = 'https://qjwghoqhjgspissyysoi.supabase.co';
        const SUPABASE_KEY = '你的Key继续用之前的'; 
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        async function fetchPosts() {
            const { data, error } = await _supabase.from('posts').select('*').order('created_at', { ascending: false });
            if (data) {
                document.getElementById('postList').innerHTML = data.map(post => `
                    <div class="glass-card p-5">
                        <div class="flex justify-between text-[10px] text-gray-500 mb-2">
                            <span>@Shelley</span><span>${new Date(post.created_at).toLocaleDateString()}</span>
                        </div>
                        <p class="text-sm">${post.content}</p>
                    </div>
                `).join('');
            }
        }
        async function savePost() {
            const content = document.getElementById('postContent').value;
            if(!content) return;
            const { error } = await _supabase.from('posts').insert([{ content: content, author: 'Shelley' }]);
            if(!error) { document.getElementById('postContent').value = ''; fetchPosts(); }
        }
        fetchPosts();
    </script>
</body>
</html>
